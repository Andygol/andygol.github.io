<details class="lang-switcher">
  <summary class="lang-switcher__trigger" aria-label="Language switcher">
    <i class="fa-solid fa-globe lang-switcher__icon" aria-hidden="true"></i>
    <span class="lang-switcher__current hidden md:inline">{{ .currentLang | upper }}</span>
    <span class="lang-switcher__chevron hidden md:inline" aria-hidden="true">▾</span>
  </summary>
  <div class="lang-switcher__menu">
    {{ range .translations }}
    <a class="lang-switcher__option {{ if eq .Language.Lang $.currentLang }}is-active{{ end }}" href="{{ .RelPermalink }}">
      <span class="lang-switcher__option-label">{{ .Language.Label }}</span>
      <span class="lang-switcher__option-code">{{ .Language.Lang | upper }}</span>
    </a>
    {{ end }}
  </div>
</details>
