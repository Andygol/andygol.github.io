<section class="page-shell error-page">
  <div class="card-surface error-card">
    <p class="error-code">404</p>
    <h1 class="error-title">{{ i18n "not_found_title" }}</h1>
    <p class="error-description">{{ i18n "not_found_description" }}</p>
    <div class="error-actions">
      <a class="btn-primary" href="{{ "/" | relLangURL }}">{{ i18n "not_found_home" }}</a>
      <a class="btn-outline" href="{{ "/contact/" | relLangURL }}">{{ i18n "not_found_contact" }}</a>
    </div>
  </div>
</section>
