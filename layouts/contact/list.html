{{ define "main" }}
<section class="page-section">
  <header class="page-header">
    <h1 class="page-title">{{ .Title }}</h1>
    {{ with .Description }}<p class="page-description">{{ . }}</p>{{ end }}
  </header>

  <div class="grid gap-3 md:grid-cols-2">
    {{ range hugo.Data.social.links }}
    <a class="card-surface contact-card flex min-w-0 flex-row items-center justify-between gap-3" href="{{ .url }}" target="_blank" rel="noopener">
      <span class="flex min-w-0 items-center gap-4">
        <span class="social-icon-btn contact-card__icon" aria-hidden="true">
          <i class="{{ .icon }}" aria-hidden="true"></i>
        </span>
        <span class="min-w-0 truncate font-semibold text-primary">{{ .label }}</span>
      </span>
      <span class="shrink-0 whitespace-nowrap text-slate-500 text-right">{{ .handle }}</span>
    </a>
    {{ end }}
  </div>
</section>
{{ end }}
