{{ define "main" }}
<section class="page-section">
  <header class="page-header">
    <h1 class="page-title">{{ .Title }}</h1>
  </header>
  <div class="grid gap-4 md:grid-cols-2">
    {{ range .Pages }}
    <article class="card-surface relative flex h-full flex-col">
      <p class="text-sm text-slate-500">{{ .Date.Format "02.01.2006" }}</p>
      <h2 class="mt-2 text-2xl font-bold text-primary">
        <a href="{{ .RelPermalink }}" class="after:absolute after:inset-0">{{ .Title }}</a>
      </h2>
      {{ with .Summary }}<p class="mt-3 flex-1 text-slate-700">{{ . | plainify | truncate 220 }}</p>{{ end }}
      {{ with .Params.tags }}
      <div class="mt-4 flex flex-wrap gap-2">
        {{ range . }}<span class="tag-chip">{{ . }}</span>{{ end }}
      </div>
      {{ end }}
    </article>
    {{ end }}
  </div>
</section>
{{ end }}
